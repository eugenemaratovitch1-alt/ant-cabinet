<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Кабинет заказчика</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">Загрузка...</div>

<script>
(function() {
    const SUPABASE_URL = 'https://xlrsfuhjwdcfxshaofrv.supabase.co';
    const SUPABASE_ANON_KEY = 'ТВОЙ_ANON_KEY';

    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const urlParams = new URLSearchParams(window.location.search);
    const clientId = urlParams.get('id');
    const app = document.getElementById('app');

    if (!clientId) {
        app.textContent = 'Нет ID клиента';
        return;
    }

    _supabase
        .from('clients2')
        .select('*')
        .eq('id', clientId)
        .maybeSingle()
        .then(res => {
            if (res.error) throw res.error;

            if (!res.data) {
                app.textContent = 'Клиент не найден';
                return;
            }

            const c = res.data;

            app.innerHTML = `
                <h2>${escapeHtml(c.name) || 'Без имени'}</h2>
                <p>📞 ${escapeHtml(c.phone) || '—'}</p>
                <p>📍 ${escapeHtml(c.addr) || '—'}</p>
                <p>📋 ${escapeHtml(c.stage) || '—'}</p>
                <p>💰 ${escapeHtml(c.sum || 0)} ₽</p>
            `;
        })
        .catch(err => {
            app.textContent = 'Ошибка: ' + (err.message || 'Неизвестная ошибка');
        });

    function escapeHtml(value) {
        if (value === null || value === undefined || value === '') return '';

        return String(value).replace(/[&<>"']/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            if (m === "'") return '&#039;';
            return m;
        });
    }
})();
</script>
</body>
</html>
