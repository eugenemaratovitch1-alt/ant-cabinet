<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кабинет заказчика</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">Загрузка...</div>

<script>
(function() {
    const SB_URL = 'https://xlrsfuhjwdcfxshaofrv.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhscnNmdWhqd2RjZnhzaGFvZnJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NDg3MjcsImV4cCI6MjA5NTUyNDcyN30.xmnVlOEogkDZNwJmG61OW-6daiuCUihMPeJ0es7Du9s';

    const app = document.getElementById('app');

    if (!app) {
        return;
    }

    if (!window.supabase) {
        app.textContent = '❌ Ошибка загрузки Supabase';
        return;
    }

    const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

    const params = new URLSearchParams(window.location.search);
    const clientId = params.get('id');

    if (!clientId) {
        app.textContent = '❌ Не указан ID клиента';
        return;
    }

    supabaseClient
        .from('clients2')
        .select('id, name, phone, addr, stage, sum')
        .eq('id', clientId)
        .maybeSingle()
        .then(function(res) {
            if (res.error) {
                throw res.error;
            }

            if (!res.data) {
                app.textContent = '❌ Клиент не найден';
                return;
            }

            renderClient(res.data);
        })
        .catch(function(err) {
            app.textContent = '❌ Ошибка: ' + getSafeValue(err.message, 'Неизвестная ошибка');
        });

    function renderClient(client) {
        app.innerHTML = '';

        const title = document.createElement('h2');
        title.textContent = getSafeValue(client.name, 'Без имени');
        app.appendChild(title);

        app.appendChild(createRow('📞 ', client.phone, '—'));
        app.appendChild(createRow('📍 ', client.addr, '—'));
        app.appendChild(createRow('📋 ', client.stage, '—'));
        app.appendChild(createRow('💰 ', formatMoney(client.sum), '0 ₽'));

        app.appendChild(document.createElement('hr'));

        const idText = document.createElement('small');
        idText.textContent = 'ID: ' + getSafeValue(client.id, '—');
        app.appendChild(idText);
    }

    function createRow(label, value, fallback) {
        const p = document.createElement('p');
        p.textContent = label + getSafeValue(value, fallback);
        return p;
    }

    function getSafeValue(value, fallback) {
        if (value === null || value === undefined || value === '') {
            return fallback;
        }

        return String(value);
    }

    function formatMoney(value) {
        if (value === null || value === undefined || value === '') {
            return '0 ₽';
        }

        const number = Number(value);

        if (Number.isFinite(number)) {
            return number.toLocaleString('ru-RU') + ' ₽';
        }

        return String(value) + ' ₽';
    }
})();
</script>
</body>
</html>
