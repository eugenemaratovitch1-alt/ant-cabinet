<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Кабинет заказчика</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">Загрузка...</div>
<script>
(function() {
    const SUPABASE_URL = 'https://xlrsfuhjwdcfxshaofrv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhscnNmdWhqd2RjZnhzaGFvZnJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NDg3MjcsImV4cCI6MjA5NTUyNDcyN30.xmnVlOEogkDZNwJmG61OW-6daiuCUihMPeJ0es7Du9s';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const urlParams = new URLSearchParams(window.location.search);
    const clientId = urlParams.get('id');
    const app = document.getElementById('app');

    if (!clientId) {
        app.innerHTML = 'Нет ID клиента';
        return;
    }

    supabase.from('clients2').select('*').eq('id', clientId).maybeSingle()
        .then(res => {
            if (res.error) throw res.error;
            if (!res.data) {
                app.innerHTML = 'Клиент не найден';
                return;
            }
            const c = res.data;
            app.innerHTML = `
                <h2>${escapeHtml(c.name) || 'Без имени'}</h2>
                <p>Телефон: ${escapeHtml(c.phone) || '—'}</p>
                <p>Адрес: ${escapeHtml(c.addr) || '—'}</p>
                <p>Этап: ${escapeHtml(c.stage) || '—'}</p>
                <p>Сумма: ${c.sum || 0} ₽</p>
            `;
        })
        .catch(err => {
            app.innerHTML = 'Ошибка: ' + err.message;
        });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
})();
</script>
</body>
</html>
