<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кабинет заказчика</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">Загрузка...</div>
<script>
    const SUPABASE_URL = 'https://xlrsfuhjwdcfxshaofrv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhscnNmdWhqd2RjZnhzaGFvZnJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NDg3MjcsImV4cCI6MjA5NTUyNDcyN30.xmnVlOEogkDZNwJmG61OW-6daiuCUihMPeJ0es7Du9s';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const clientId = urlParams.get('id');

    async function load() {
        if (!clientId) {
            document.getElementById('app').innerHTML = 'Нет ID';
            return;
        }
        const { data, error } = await supabase.from('clients2').select('*').eq('id', clientId).maybeSingle();
        if (error || !data) {
            document.getElementById('app').innerHTML = 'Клиент не найден';
            return;
        }
        document.getElementById('app').innerHTML = `
            <h2>${data.name || 'Без имени'}</h2>
            <p>Телефон: ${data.phone || '—'}</p>
            <p>Адрес: ${data.addr || '—'}</p>
            <p>Этап: ${data.stage || '—'}</p>
            <p>Сумма: ${data.sum || 0} ₽</p>
        `;
    }
    load();
</script>
</body>
</html>
